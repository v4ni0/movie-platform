# Use H2 in-memory database for all tests — no Docker/PostgreSQL required
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Spring AI — reuse keys from environment, fall back to empty (AI integration tests will skip if unset)
spring.ai.openai.api-key=ollama
spring.ai.openai.base-url=http://localhost:11434
spring.ai.openai.chat.options.model=gemma3:1b
spring.ai.openai.chat.options.temperature=0.7

tmdb.api.key=${TMDB_API_KEY:}
cors.allowed-origin=http://localhost:3000

# Suppress the conditions evaluation report in test output
logging.level.org.springframework.boot.autoconfigure=WARN
