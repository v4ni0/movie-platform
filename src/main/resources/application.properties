spring.application.name=movie-platform
spring.profiles.active=local

# The origin of the frontend application that is allowed to make cross-origin requests.
# Change this to your production frontend URL when deploying (e.g. https://myapp.com).
cors.allowed-origin=http://localhost:3000
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
tmdb.api.key=${TMDB_API_KEY:}

# Spring AI - HuggingFace Inference (OpenAI-compatible)
spring.ai.openai.api-key=${HUGGINGFACE_API_KEY:}
spring.ai.openai.base-url=https://router.huggingface.co/hf-inference/models/google/gemma-3-4b-it
spring.ai.openai.chat.options.model=google/gemma-3-4b-it
spring.ai.openai.chat.options.temperature=0.7

server.port = 8081
# H2 (without docker)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:moviedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

